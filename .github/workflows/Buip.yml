name: TWRP Device Tree Generator (Forçado)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio cpuid lz4 xz-utils
        pip install twrpdtgen
        # Baixa uma ferramenta alternativa de unpack do AOSP
        wget https://github.com/cfig/Android_boot_image_editor/releases/download/v4.8.0/gradlew -O /tmp/noop || true
        # Usaremos o python do twrpdtgen apontando direto se possível, mas vamos extrair antes

    - name: Download Vendor Boot
      run: |
        curl -L -o vendor_boot.img "https://drive.usercontent.google.com/download?id=1xrz4f5gE5Z4NGbsYPM-WUwJw8OORoC7O&export=download&authuser=0"

    - name: Try Alternative Extraction
      run: |
        # Caso o twrpdtgen falhe no arquivo, tentamos passar parâmetros ou extrair componentes básicos
        # Algumas versões aceitam passar o diretório do ramdisk direto se extraído, mas vamos testar forçar flags
        python3 -m twrpdtgen vendor_boot.img || true
        
    - name: Archive Anything Generated
      run: |
        mkdir -p output_fix
        if [ -d "output" ]; then cp -r output/* output_fix/; fi

    - name: Upload Device Tree Artifact
      uses: actions/upload-artifact@v4
      with:
        name: twrp_device_tree
        path: output_fix/
