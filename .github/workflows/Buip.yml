name: TWRP Device Tree Generator

on:
  workflow_dispatch: # Permite que você ative o processo manualmente com um clique

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio cpuid lz4 xz-utils matrixssl
        pip install twrpdtgen

    - name: Download Vendor Boot
      run: |
        # Substitua o link abaixo pelo link direto do seu vendor_boot.img (pode usar Google Drive, AndroidFileHost, etc.)
        curl -L -o vendor_boot.img "SEU_LINK_DIRETO_AQUI"

    - name: Generate Device Tree
      run: |
        python3 -m twrpdtgen vendor_boot.img

    - name: Upload Device Tree Artifact
      uses: actions/upload-artifact@v4
      with:
        name: twrp_device_tree
        path: output/
